name: lean-graph

on:
  workflow_dispatch:
    inputs:
      depth:
        description: "BFS dependency depth for lean-graph extraction"
        required: true
        default: "3"
      commit_output:
        description: "Commit the JSON output back to this branch"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build target module
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: "lean"
          build-args: "RequestProject.Erdos306FormalConjectures"

      - name: Prepare lean-graph extractor
        working-directory: lean
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/patrik-cihal/lean-graph/main/static/DependencyExtractor.lean \
            -o LeanGraphExtract.lean
          sed -i '1i import RequestProject.Erdos306FormalConjectures' LeanGraphExtract.lean
          cat >> LeanGraphExtract.lean <<'EOF'

          #eval serializeAndWriteToFile
            (Source.Constant `(@Erdos306.erdos_306))
            ${{ inputs.depth }}
          EOF

      - name: Extract dependency graph JSON
        working-directory: lean
        run: lake env lean LeanGraphExtract.lean

      - name: Collect output
        working-directory: lean
        run: |
          mkdir -p ../lean-graph-output
          cp Erdos306.erdos_306.json ../lean-graph-output/
          wc -c ../lean-graph-output/Erdos306.erdos_306.json

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: lean-graph-erdos306-depth-${{ inputs.depth }}
          path: lean-graph-output/Erdos306.erdos_306.json

      - name: Commit output to branch
        if: ${{ inputs.commit_output }}
        run: |
          mkdir -p lean-graph-output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lean-graph-output/Erdos306.erdos_306.json
          git commit -m "Add lean-graph output for Erdos306.erdos_306 depth ${{ inputs.depth }}" || echo "No changes to commit"
          git push
